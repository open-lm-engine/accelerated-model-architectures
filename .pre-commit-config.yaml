fail_fast: true

repos:
  - repo: local
    hooks:
      - id: add-copyright
        name: add copyright header
        language: python
        entry: python tools/copyright.py --repo . --header "Copyright (c) 2026, Mayank Mishra" --no-contributors
        types: [python]
        pass_filenames: false
      - id: check-copyright
        name: check copyright year
        language: python
        entry: python tools/copyright.py --repo . --header "Copyright (c) 2026, Mayank Mishra" --no-contributors --check
        types: [python]
        pass_filenames: false
  - repo: https://github.com/PyCQA/autoflake
    rev: v2.3.1
    hooks:
      - id: autoflake
  - repo: https://github.com/pycqa/isort
    rev: 7.0.0
    hooks:
      - id: isort
        name: isort (python)
  - repo: https://github.com/psf/black
    rev: 25.11.0
    hooks:
      - id: black
        args: [--line-length=119,--target-version=py312]
  - repo: https://github.com/pre-commit/mirrors-clang-format
    rev: v21.1.6
    hooks:
      - id: clang-format
        types_or: [c++, c, cuda]
        args: [-style=file:.clang-format]
  - repo: local
    hooks:
      - id: build-website
        name: build website
        language: system
        entry: make website
        pass_filenames: false
        always_run: true
